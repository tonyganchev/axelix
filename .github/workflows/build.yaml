name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ github.actor }}
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Gradle build
        run: ./gradlew build

      - name: Stage JAR file
        uses: actions/upload-artifact@v4
        with:
          name: master-jar
          path: master/build/libs/master.jar

  test-deploy:
    name: Deploy Master application to Yandex Cloud
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Download staged jar
        uses: actions/download-artifact@v5
        with:
          name: master-jar

      - name: Build Docker Image
        # TODO: extract version from gradle.properties file later on. For now hardcoded is fine
        run: |
          docker build --tag master:1.0.0-SNAPSHOT  --file master/docker/Dockerfile .