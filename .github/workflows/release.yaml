name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: 'Git release tag (e.g., v1.0.1)'
        required: true
        type: string

env:
  USERNAME: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_CONTAINER_REGISTRY: ghcr.io
  RELEASE_TAG: ${{ github.event.inputs.git_tag }}
  PGP_KEY_ID: ${{ secrets.PGP_KEY_ID }}
  PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
  PGP_SIGNING_KEY_PASSPHRASE: ${{ secrets.PGP_SIGNING_KEY_PASSPHRASE }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      # TODO: Change to java 25 later on
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'

      # Intentionally leaving the setup-gradle action for release pipeline to not introduce any cached behavior
      # and to create the release build from scratch.
      - name: Build
        run: ./gradlew clean build sourcesJar javadocJar

      - name: Publish to GitHub Packages
        run: ./gradlew publishGprPublicationToGitHubPackagesRepository

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GH_CONTAINER_REGISTRY }}
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: master/docker/Dockerfile
          push: true
          tags: |
            ${{ env.GH_CONTAINER_REGISTRY }}/${{ github.repository_owner }}:${{ env.RELEASE_TAG }}