name: Build / Deploy Front-End

on:
  workflow_dispatch:
    inputs:
      helm_chart_branch:
        description: 'Helm chart branch name'
        required: false
        type: string
        default: 'main'
  push:
    branches: [ master ]
    paths:
      - 'front-end/**'
      - 'distributions/**'
      - '.github/workflows/frontend.yaml'
  pull_request:
    branches: [ master ]
    paths:
      - 'front-end/**'
      - '.github/workflows/frontend.yaml'
    types:
      - opened
      - reopened
      - synchronize

env:
  MASTER_PUSH_OR_MANUAL: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch' }}

jobs:
  check-linked-issues:
    if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for linked issues
        uses: nearform-actions/github-action-check-linked-issues@v1
        with:
          exclude-labels: "refactoring"

  build-deploy-source:
    runs-on: ubuntu-latest
    env:
      DOCKER_CR_OAUTH_TOKEN: ${{ secrets.DOCKER_CR_OAUTH_TOKEN }}
      # TODO: Rename the CR variable. We're likely going to use multiple CRs
      CR_URL: ${{ vars.CR_URL }}
      IMAGE_REPOSITORY: ${{ vars.CR_URL }}/${{ vars.CR_MASTER_REPOSITORY }}
      IMAGE_NAME: master-fe
      KUBE_CONFIG_BASE64: ${{ secrets.KUBE_CONFIG_BASE64 }}
      # Use branch from workflow_dispatch input if provided, otherwise default to 'main'
      HELM_CHART_BRANCH: ${{ github.event.inputs.helm_chart_branch || 'main' }}

      # Vite Config
      VITE_APP_SOURCE_CODE_LINK: https://github.com/axelixlabs/axelix
      VITE_APP_ISSUE_TRACKER_LINK: https://github.com/axelixlabs/axelix/issues
      VITE_APP_LICENSE_LINK: https://www.gnu.org/licenses/lgpl-3.0.en.html
      VITE_APP_REFERENCE_GUIDE_LINK: #TODO
      VITE_APP_BLOG_LINK: #TODO
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Lint application
        run: npm run lint

      - name: CSS lint application
        run: npm run lint-css

      - name: Run tests
        run: npm test

      - name: Set up Docker
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        uses: docker/setup-docker-action@v4

      - name: Read Gradle Properties file
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        uses: madhead/read-java-properties@4
        id: gradleProperties
        with:
          file: gradle.properties
          property: axelixVersion

      - name: Actualize NPM Version
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        run: npm version ${{ steps.gradleProperties.outputs.value }}

      - name: Create Vite Configuration
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        run: |
          echo "VITE_APP_VERSION=${{ steps.gradleProperties.outputs.value }}" >> .env
          echo "VITE_APP_SOURCE_CODE_LINK=${{ env.VITE_APP_SOURCE_CODE_LINK }}" >> .env
          echo "VITE_APP_ISSUE_TRACKER_LINK=${{ env.VITE_APP_ISSUE_TRACKER_LINK }}" >> .env
          echo "VITE_APP_LICENSE_LINK=${{ env.VITE_APP_LICENSE_LINK }}" >> .env
          echo "VITE_APP_REFERENCE_GUIDE_LINK=${{ env.VITE_APP_REFERENCE_GUIDE_LINK }}" >> .env
          echo "VITE_APP_BLOG_LINK=${{ env.VITE_APP_BLOG_LINK }}" >> .env

      - name: Building JS Bundles
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        run: npm run build

      - name: Clean-up
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        run: rm .env

      - name: Build Docker Image
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        # TODO:
        #  For now the version of package is hardcoded both in package.json and in here. We later would need to
        #  find a way to manage it correctly.
        run: |
          docker build --tag $IMAGE_REPOSITORY/$IMAGE_NAME:${{ steps.gradleProperties.outputs.value }} --file Dockerfile .

      - name: Docker login to Cloud Container Registry
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        # TODO: Is it possible to authenticate via service account? Cause currently here in the OAUTH_TOKEN is a maintainer's PAT
        run: echo $DOCKER_CR_OAUTH_TOKEN | docker login --username oauth --password-stdin $CR_URL

      - name: Docker push to Cloud Container Registry
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        run: docker push $IMAGE_REPOSITORY/$IMAGE_NAME:${{ steps.gradleProperties.outputs.value }}

      - name: Docker logout
        if: ${{ env.MASTER_PUSH_OR_MANUAL  == 'true'}}
        run: docker logout

      - name: Checkout helm-charts repository
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        uses: actions/checkout@v5
        with:
          repository: axelixlabs/helm-charts
          ref: ${{ env.HELM_CHART_BRANCH }}
          path: helm-charts
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Helm
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.14.0

      - name: Deploy master to K8S
        if: ${{ env.MASTER_PUSH_OR_MANUAL == 'true' }}
        working-directory: helm-charts/charts/axelix
        run: |
          mkdir -p ~/.kube
          touch ~/.kube/config
          echo "$KUBE_CONFIG_BASE64" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config
          helm upgrade \
            --set frontend.image.pullPolicy=Always \
            --set backend.image.pullPolicy=Always \
            --set frontend.image.name=$IMAGE_REPOSITORY/$IMAGE_NAME \
            --set frontend.image.tag=${{ steps.gradleProperties.outputs.value }} \
            --set backend.image.name=$IMAGE_REPOSITORY/master \
            --set backend.image.tag=${{ steps.gradleProperties.outputs.value }} \
            --install master . \
            -f values.yaml
