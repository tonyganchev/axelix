name: Build / Deploy Front-End

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
    paths:
      - 'front-end/**'
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches: [ master ]
    paths:
      - 'front-end/**'

permissions: 
  issues: read
  pull-requests: read
  contents: read

jobs:
  check_linked_issues:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if not a pull_request event
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "Not a pull_request event - skipping linked-issues check.";
          exit 0;
          fi
      - name: Check PR labels for refactoring
        id: check_label
        uses: actions/github-script@v6
        with:
          script: |
            const core = require('@actions/core');
            const labels = (context.payload.pull_request && context.payload.pull_request.labels) || [];
            const names = labels.map(l => l.name.toLowerCase());
            const refLabel = 'refactoring';
            const hasRefactoring = names.includes(refLabel);
            core.setOutput('has_refactoring', hasRefactoring ? 'true' : 'false');
      - name: Skip linked-issues check if refactoring label present
        if: ${{ steps.check_label.outputs.has_refactoring == 'true' }}
        run: |
          echo "The PR is labeled 'refactoring' - the linked issues check was skipped."
      - name: Run linked-issues check
        if: ${{ steps.check_label.outputs.has_refactoring != 'true' }}
        uses: nearform-actions/github-action-check-linked-issues@v1
        id: check-linked-issues
      - name: Fail if no linked issues found
        if: ${{ steps.check_label.outputs.has_refactoring != 'true' && steps.check-linked-issues.outputs.linked_issues_count == '0' }}
        run: |
          echo "ERROR: No linked issues found (linked_issues_count=${{ steps.check-linked-issues.outputs.linked_issues_count }}).";
          echo "Failing the job to block merge until an issue is linked in PR description.";
          exit 1;
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint application
        run: npm run lint
  deploy:
    needs: lint
    env:
      DOCKER_CR_OAUTH_TOKEN: ${{ secrets.DOCKER_CR_OAUTH_TOKEN }}
      CR_URL: ${{ vars.CR_URL }}
      CR_FRONTEND_REPOSITORY: ${{ vars.CR_FRONTEND_REPOSITORY }}
      KUBE_CONFIG_BASE64: ${{ secrets.KUBE_CONFIG_BASE64 }}
    name: Build nginx Docker container
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Build Docker Image
        # TODO:
        #  For now the version of package is hardcoded both in package.json and in here. We later would need to
        #  find a way to manage it correctly.
        run: |
          docker build --tag $CR_URL/$CR_FRONTEND_REPOSITORY/master-fe:1.0.0-SNAPSHOT --file front-end/Dockerfile .

      - name: Docker login to Yandex Cloud CR
        # TODO: Is it possible to authenticate via service account? Cause currently here in the OAUTH_TOKEN is my token
        run: echo $DOCKER_CR_OAUTH_TOKEN | docker login --username oauth --password-stdin $CR_URL

      - name: Docker push to Yandex Cloud CR
        run: docker push $CR_URL/$CR_FRONTEND_REPOSITORY/master-fe:1.0.0-SNAPSHOT

      - name: Docker logout
        run: docker logout

      - name: Setup Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.14.0

      - name: Deploy master to K8S
        working-directory: front-end/chart
        run: |
          mkdir -p ~/.kube
          touch ~/.kube/config
          echo "$KUBE_CONFIG_BASE64" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config
          helm upgrade --install front-end . --set image.ref=$CR_URL/$CR_FRONTEND_REPOSITORY/master-fe:1.0.0-SNAPSHOT -f values.yaml
