name: Deploy Docs and Blog

#on:
#  push:
#    branches: [master]
#    paths:
#      - 'docs/**'

on:
  push:
    branches: [feature/GH-794]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build