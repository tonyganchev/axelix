name: Deploy Docs and Blog

#on:
#  push:
#    branches: [master]
#    paths:
#      - 'docs/**'

on:
  push:
    branches: [feature/GH-794]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy global resources to VM via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.WEBSITE_PRODUCTION_VM_HOST }}
          username: ${{ secrets.WEBSITE_PRODUCTION_VM_USER }}
          key: ${{ secrets.WEBSITE_PRODUCTION_VM_PRIVATE_KEY }}
          source: "docker-compose.yml,infra/nginx"
          target: "/home/${{ secrets.WEBSITE_PRODUCTION_VM_USER }}"

      - name: Copy build to VM via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.WEBSITE_PRODUCTION_VM_HOST }}
          username: ${{ secrets.WEBSITE_PRODUCTION_VM_USER }}
          key: ${{ secrets.WEBSITE_PRODUCTION_VM_PRIVATE_KEY }}
          source: "docs/build,docs/Dockerfile"
          target: "/home/${{ secrets.WEBSITE_PRODUCTION_VM_USER }}/axelix-docs"
          strip_components: 1

      - name: Build Docker image on server and restart container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.WEBSITE_PRODUCTION_VM_HOST }}
          username: ${{ secrets.WEBSITE_PRODUCTION_VM_USER }}
          key: ${{ secrets.WEBSITE_PRODUCTION_VM_PRIVATE_KEY }}
          script: |
            set -eux
            cd /home/${{ secrets.WEBSITE_PRODUCTION_VM_USER }}
            sudo docker compose down -v
            sudo docker compose up --build -d