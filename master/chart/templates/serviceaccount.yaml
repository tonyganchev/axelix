{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "app.serviceAccountName" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: default
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # TODO: revisit the namespace here. It almost certainly would not be 'default'
  # namespace: default
  name: {{ include "app.serviceAccountName" . }}-role
rules:
  # TODO: In the future we need to narrow these permissions to grant only the required ones.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "app.serviceAccountName" . }}-role-binding
  # namespace: default # TODO: again, revisit this later
subjects:
  - kind: ServiceAccount
    name: {{ include "app.serviceAccountName" . }}
    namespace: default # TODO: again, revisit this later
roleRef:
  kind: ClusterRole
  name: {{ include "app.serviceAccountName" . }}-role
  apiGroup: rbac.authorization.k8s.io