components:
  schemas:
    InstanceShortProfile:
      type: object
      properties:
        instanceId:
          type: string
        name:
          type: string
        serviceVersion:
          type: string
        commitShaShort:
          type: string
        status:
          type: string
          enum:
            - UP
            - DOWN
            - UNKNOWN
        deployedFor:
          type: string
        javaVersion:
          type: string
        springBootVersion:
          type: string
    InstancesGridResponse:
      type: object
      properties:
        instances:
          type: array
          items:
            $ref: '#/components/schemas/InstanceShortProfile'