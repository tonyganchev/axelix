components:
  schemas:
######### Environment API -> EnvironmentPropertyResponse #########
    EnvironmentPropertyResponse:
      type: object
      properties:
        source:
          type: string
        value:
          type: string
        propertySources:
          type: array
          items:
            $ref: '#/components/schemas/PropertySource'
    Property:
      type: object
      properties:
        value:
          type: string
        origin:
          type: string
    PropertySource:
      type: object
      properties:
        name:
          type: string
        property:
          $ref: '#/components/schemas/Property'

######### Environment API -> EnvironmentFeedResponse #########
    EnvironmentFeedResponse:
      type: object
      properties:
        activeProfiles:
          type: array
          items:
            type: string
        defaultProfiles:
          type: array
          items:
            type: string
        propertySources:
          type: array
          items:
            $ref: '#/components/schemas/PropertySourceShortProfile'
    KeyValue:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    PropertySourceShortProfile:
      type: object
      properties:
        name:
          type: string
        properties:
          type: array
          items:
            $ref: '#/components/schemas/KeyValue'