components:
  schemas:
    KeyValue:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

######### Configprops API -> ConfigpropsByPrefixResponse #########
    ConfigpropsByPrefixResponse:
      type: object
      properties:
        beans:
          type: array
          items:
            $ref: '#/components/schemas/ConfigpropsProfile'
    ConfigpropsProfile:
      type: object
      properties:
        beanName:
          type: string
        prefix:
          type: string
        properties:
          type: array
          items:
            $ref: '#/components/schemas/KeyValue'
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/KeyValue'

######### Configprops API -> ConfigpropsFeedResponse #########
    ConfigpropsFeedResponse:
      type: object
      properties:
        beans:
          type: array
          items:
            $ref: '#/components/schemas/ConfigpropsProfile'