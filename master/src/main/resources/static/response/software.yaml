components:
  schemas:
    DistributionResponse:
      type: object
      properties:
        softwareComponentName:
          type: string
        versions:
          type: object
          additionalProperties:
            type: integer
            format: int64

    DistributionSummaryResponse:
      type: object
      properties:
        distributions:
          type: array
          items:
            $ref: '#/components/schemas/DistributionResponse'