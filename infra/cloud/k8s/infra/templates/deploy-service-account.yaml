apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-cd-deployer
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: ci-cd-deployer-role
rules:
  - apiGroups: ["", "apps", "batch", "extensions"]
    resources: ["deployments", "services", "configmaps", "secrets", "pods", "replicasets", "jobs", "cronjobs", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-cd-deployer-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ci-cd-deployer
    namespace: default
roleRef:
  kind: Role
  name: ci-cd-deployer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: ci-cd-deployer-token
  annotations:
    kubernetes.io/service-account.name: ci-cd-deployer
type: kubernetes.io/service-account-token